<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hotel Bell Elite</title>
  {% include 'partials/de_android_head.html' %}
  <link rel="stylesheet" href="{{ url_for('static', filename='login_premium.css') }}" />
</head>
<body class="login-page">
  <div class="login-orb login-orb-1" aria-hidden="true"></div>
  <div class="login-orb login-orb-2" aria-hidden="true"></div>

  <div class="login-box">
    <div class="login-logo">HBE</div>
    <h1 class="login-title">Hotel Bell Elite</h1>
    <p class="login-subtitle">Sales update — sign in to continue</p>

    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</body>
</html>
