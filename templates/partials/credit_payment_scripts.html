<script>
(function(){
  var page = document.getElementById('credit-payment-page');
  if (!page) return;

  var createUrl = page.getAttribute('data-create-url') || '';
  var deleteUrl = page.getAttribute('data-delete-url') || '';
  var detailUrlTemplate = page.getAttribute('data-detail-url-template') || '';
  var todayIso = page.getAttribute('data-today') || '';
  var methodLabels = {{ credit_payment_method_labels|tojson }};
  var categoryLabels = {{ expense_category_labels|tojson }};
  var labels = {{ settlement_labels|tojson }};
  var showPaymentMode = labels.show_payment_mode !== false;
  var showVerificationAccount = labels.show_verification_account === true;

  var outstandingData = [];
  try {
    var dataEl = document.getElementById('cp-outstanding-data');
    outstandingData = dataEl ? JSON.parse(dataEl.textContent || '[]') : [];
  } catch (e) {
    outstandingData = [];
  }

  var pendingSelections = [];
  var selectionSource = 'table'; // 'table' | 'modal'

  function formatInr(amount, dec){
    var places = dec === undefined ? 0 : dec;
    if (typeof window.formatInr === 'function') return window.formatInr(amount, places);
    var n = Number(amount || 0);
    if (!isFinite(n)) return '₹0';
    return (n < 0 ? '−' : '') + '₹' + Math.abs(n).toLocaleString('en-IN', {
      maximumFractionDigits: places,
      minimumFractionDigits: 0
    });
  }

  function isKpiAmountNode(el){
    return !!(el && (
      el.classList.contains('pl-summary-value') ||
      el.classList.contains('kpi-val') ||
      el.classList.contains('hbe-kpi-value') ||
      el.classList.contains('sr-kpi-value') ||
      el.classList.contains('tips-payout-metric-value')
    ));
  }

  function formatMoneyNodes(root){
    (root || document).querySelectorAll('[data-amount]').forEach(function(el){
      el.textContent = formatInr(el.getAttribute('data-amount'), isKpiAmountNode(el) ? 0 : 0);
    });
  }

  formatMoneyNodes(document);
  if (typeof scheduleFitKpiValues === 'function') scheduleFitKpiValues();

  function openModal(el){
    if (!el) return;
    el.classList.add('open');
    el.setAttribute('aria-hidden', 'false');
  }

  function closeModal(el){
    if (!el) return;
    el.classList.remove('open');
    el.setAttribute('aria-hidden', 'true');
  }

  function setError(el, msg){
    if (!el) return;
    if (msg) {
      el.textContent = msg;
      el.style.display = 'block';
    } else {
      el.textContent = '';
      el.style.display = 'none';
    }
  }

  function escapeHtml(value){
    return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function selectionFromRow(row, amount){
    var balance = Number(row.getAttribute('data-balance') || 0);
    var payAmount = amount == null ? balance : Number(amount);
    return {
      expense_id: Number(row.getAttribute('data-expense-id')),
      amount: payAmount,
      balance: balance,
      expense_code: row.getAttribute('data-expense-code') || '',
      description: row.getAttribute('data-description') || '',
      supplier_id: Number(row.getAttribute('data-supplier-id') || 0),
      supplier_name: row.getAttribute('data-supplier-name') || '',
      category: row.getAttribute('data-category') || ''
    };
  }

  /* ---------- Filters (parity with purchase ledger; soft-nav safe) ---------- */
  function closeCpListbox(root){
    if (!root) return;
    var trigger = root.querySelector('.se-filter-chip-trigger');
    var list = root.querySelector('.se-filter-listbox');
    var search = root.querySelector('.pl-supplier-search');
    root.classList.remove('is-open');
    if (trigger) trigger.setAttribute('aria-expanded', 'false');
    if (list) {
      list.hidden = true;
      list.style.paddingBottom = '';
      list.scrollTop = 0;
    }
    if (search) search.value = '';
    if (root.hasAttribute('data-se-listbox-searchable')) filterCpSearchableOptions(root, '');
  }

  function closeAllCpListboxes(except){
    document.querySelectorAll('#credit-payment-filter-form [data-se-listbox].is-open').forEach(function(root){
      if (root !== except) closeCpListbox(root);
    });
  }

  function scoreCpSearchOption(option, needle){
    if (!needle) return 0;
    var name = (option.getAttribute('data-name') || '').toLowerCase();
    var gst = (option.getAttribute('data-gst') || '').toLowerCase();
    var terms = needle.split(/\s+/).filter(Boolean);
    var score = 0;
    for (var i = 0; i < terms.length; i++) {
      var term = terms[i];
      if (name === term || (gst && gst === term)) score += 120;
      else if (name.indexOf(term) === 0) score += 90;
      else if (gst && gst.indexOf(term) === 0) score += 80;
      else if (name.indexOf(term) !== -1) score += 60;
      else if (gst && gst.indexOf(term) !== -1) score += 50;
      else return -1;
    }
    return score;
  }

  function filterCpSearchableOptions(root, query){
    var optionsWrap = root.querySelector('.pl-supplier-options');
    var emptyEl = root.querySelector('.pl-supplier-empty');
    if (!optionsWrap) return;
    var needle = String(query || '').trim().toLowerCase();
    var options = Array.from(optionsWrap.querySelectorAll('.pl-supplier-option'));
    if (!needle) {
      options.forEach(function(option){ option.classList.remove('is-filtered-out'); });
      if (emptyEl) emptyEl.hidden = true;
      return;
    }
    var ranked = options.map(function(option){
      return { option: option, score: scoreCpSearchOption(option, needle) };
    }).filter(function(entry){
      return entry.score >= 0 && (entry.option.getAttribute('data-value') || '') !== 'all';
    });
    ranked.sort(function(a, b){
      return b.score - a.score || (a.option.getAttribute('data-name') || '').localeCompare(b.option.getAttribute('data-name') || '');
    });
    var best = ranked.length ? [ranked[0]] : [];
    options.forEach(function(option){ option.classList.add('is-filtered-out'); });
    best.forEach(function(entry){ entry.option.classList.remove('is-filtered-out'); });
    if (emptyEl) emptyEl.hidden = true;
  }

  function visibleCpOptions(root){
    var optionsWrap = root.querySelector('.pl-supplier-options');
    if (!optionsWrap) return [];
    return Array.from(optionsWrap.querySelectorAll('.pl-supplier-option:not(.is-filtered-out)'));
  }

  function scrollCpSelectedToTop(list){
    if (!list) return;
    var selected = list.querySelector('.se-filter-listbox-option.is-selected, .se-filter-listbox-option[aria-selected="true"], .pl-supplier-option.is-selected');
    if (!selected || selected.classList.contains('is-filtered-out')) return;
    list.style.paddingBottom = '';
    requestAnimationFrame(function(){
      var searchWrap = list.querySelector('.pl-supplier-search-wrap, .ep-listbox-search-wrap');
      var topPad = searchWrap ? searchWrap.offsetHeight : 0;
      if (list.scrollHeight <= list.clientHeight + 1) {
        list.scrollTop = 0;
        return;
      }
      var target = Math.max(0, selected.offsetTop - topPad);
      var naturalMax = Math.max(0, list.scrollHeight - list.clientHeight);
      if (target > naturalMax) {
        list.style.paddingBottom = (target - naturalMax) + 'px';
      }
      list.scrollTop = target;
    });
  }

  function openCpListbox(root){
    if (!root || root.classList.contains('is-disabled')) return;
    closeAllCpListboxes(root);
    var trigger = root.querySelector('.se-filter-chip-trigger');
    var list = root.querySelector('.se-filter-listbox');
    var search = root.querySelector('.pl-supplier-search');
    root.classList.add('is-open');
    if (trigger) trigger.setAttribute('aria-expanded', 'true');
    if (list) {
      list.hidden = false;
      if (root.hasAttribute('data-se-listbox-searchable')) {
        filterCpSearchableOptions(root, '');
        scrollCpSelectedToTop(list);
        if (search) {
          search.value = '';
          search.focus();
        }
      } else {
        scrollCpSelectedToTop(list);
      }
    }
  }

  function toggleCpListbox(root){
    if (!root) return;
    if (root.classList.contains('is-open')) closeCpListbox(root);
    else openCpListbox(root);
  }

  function selectCpOption(root, option){
    if (!root || !option || option.classList.contains('is-filtered-out')) return;
    var form = document.getElementById('credit-payment-filter-form');
    var input = root.querySelector('input[type="hidden"]');
    var valueEl = root.querySelector('.se-filter-chip-value');
    var list = root.querySelector('.se-filter-listbox');
    var value = option.getAttribute('data-value') || 'all';
    var nameEl = option.querySelector('.pl-supplier-option-name');
    var label = nameEl ? nameEl.textContent.trim() : (option.textContent || '').trim();
    if (input) input.value = value;
    if (valueEl) valueEl.textContent = label;
    if (list) {
      list.querySelectorAll('.pl-supplier-option, .se-filter-listbox-option').forEach(function(opt){
        var on = opt === option;
        opt.classList.toggle('is-selected', on);
        opt.setAttribute('aria-selected', on ? 'true' : 'false');
      });
    }
    closeCpListbox(root);
    if (!form) return;
    if (typeof window.deSoftSubmitForm === 'function' && window.deSoftSubmitForm(form)) return;
    form.submit();
  }

  function bindCpListbox(root){
    if (!root || root.__cpFilterListboxBound) return;
    root.__cpFilterListboxBound = true;
    // Prevent ep_form_listbox.js from double-binding after soft-nav.
    root.__suFilterListboxBound = true;
    root.__plFilterListboxBound = true;
    var trigger = root.querySelector('.se-filter-chip-trigger');
    var control = root.querySelector('.se-filter-chip-control');
    var list = root.querySelector('.se-filter-listbox');
    var optionsWrap = root.querySelector('.pl-supplier-options');
    var search = root.querySelector('.pl-supplier-search');
    if (!trigger || !list) return;

    function onTriggerClick(e){
      e.preventDefault();
      e.stopPropagation();
      toggleCpListbox(root);
    }

    trigger.addEventListener('click', onTriggerClick);
    if (control) {
      control.addEventListener('click', function(e){
        if (e.target.closest('.se-filter-chip-trigger')) return;
        if (e.target.closest('.se-filter-listbox')) return;
        onTriggerClick(e);
      });
    }
    trigger.addEventListener('keydown', function(e){
      if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openCpListbox(root);
      } else if (e.key === 'Escape') {
        closeCpListbox(root);
      }
    });

    if (search) {
      search.addEventListener('input', function(){
        filterCpSearchableOptions(root, search.value);
      });
      search.addEventListener('click', function(e){ e.stopPropagation(); });
      search.addEventListener('keydown', function(e){
        e.stopPropagation();
        if (e.key === 'Escape') {
          e.preventDefault();
          closeCpListbox(root);
          trigger.focus();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          var firstMatch = visibleCpOptions(root)[0];
          if (firstMatch) selectCpOption(root, firstMatch);
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          var first = visibleCpOptions(root)[0];
          if (first) first.focus();
        }
      });
    }

    var clickTarget = optionsWrap || list;
    clickTarget.addEventListener('click', function(e){
      var option = e.target.closest('.pl-supplier-option, .se-filter-listbox-option');
      if (!option || !clickTarget.contains(option) || option.classList.contains('is-filtered-out')) return;
      e.preventDefault();
      selectCpOption(root, option);
    });

    clickTarget.addEventListener('keydown', function(e){
      var options = root.hasAttribute('data-se-listbox-searchable')
        ? visibleCpOptions(root)
        : Array.from(list.querySelectorAll('.se-filter-listbox-option'));
      if (!options.length) return;
      var idx = options.indexOf(document.activeElement);
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        options[Math.min(options.length - 1, Math.max(0, idx) + 1)].focus();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        options[Math.max(0, (idx < 0 ? 0 : idx) - 1)].focus();
      } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (idx >= 0) selectCpOption(root, options[idx]);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        closeCpListbox(root);
        trigger.focus();
      }
    });
  }

  function bindCpDocumentGuards(){
    if (window.__cpFilterDocBound) return;
    window.__cpFilterDocBound = true;
    document.addEventListener('click', function(e){
      document.querySelectorAll('#credit-payment-filter-form [data-se-listbox].is-open').forEach(function(root){
        if (!root.contains(e.target)) closeCpListbox(root);
      });
    });
    document.addEventListener('keydown', function(e){
      if (e.key !== 'Escape') return;
      document.querySelectorAll('#credit-payment-filter-form [data-se-listbox].is-open').forEach(closeCpListbox);
    });
  }

  function initCreditPaymentFilters(){
    var filterForm = document.getElementById('credit-payment-filter-form');
    if (!filterForm) return;
    bindCpDocumentGuards();
    filterForm.querySelectorAll('[data-se-listbox]').forEach(bindCpListbox);

    if (window.SalesDateRangePicker) {
      SalesDateRangePicker.init({
        wrapId: 'cp-date-range-wrap',
        triggerId: 'cp-date-range-trigger',
        backdropId: 'cp-date-range-backdrop',
        panelId: 'cp-date-range-panel',
        displayId: 'cp-date-range-display',
        formId: 'credit-payment-filter-form',
        fromInputId: 'credit-payment-date-from',
        toInputId: 'credit-payment-date-to',
        applyId: 'cp-date-range-apply',
        prevId: 'cp-cal-prev',
        nextId: 'cp-cal-next',
        title0Id: 'cp-cal-title0',
        title1Id: 'cp-cal-title1',
        grid0Id: 'cp-cal-grid0',
        grid1Id: 'cp-cal-grid1',
        emptyLabel: 'Date',
        onBeforeSubmit: function(){
          filterForm.querySelectorAll(
            'input[name="date_from"], input[name="date_to"], input[name="payment_date_from"], input[name="payment_date_to"]'
          ).forEach(function(input){
            if (!input.value) input.removeAttribute('name');
          });
        }
      });
    }

    var clearBtn = document.getElementById('cp-date-range-clear');
    if (clearBtn && clearBtn.getAttribute('data-cp-clear-bound') !== '1') {
      clearBtn.setAttribute('data-cp-clear-bound', '1');
      clearBtn.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        var clearUrl = filterForm.getAttribute('data-clear-url') || filterForm.action || '';
        if (clearUrl) window.location.href = clearUrl;
      });
    }
  }

  window.initCreditPaymentFilters = initCreditPaymentFilters;
  initCreditPaymentFilters();

  /* ---------- Outstanding table multi-select ---------- */
  var outstandingTable = document.getElementById('cp-outstanding-table');
  var selectAllCheck = document.getElementById('cp-select-all');
  var selectionBar = document.getElementById('cp-selection-bar');
  var tableSelectCountEl = document.getElementById('cp-table-select-count');
  var tableSelectTotalEl = document.getElementById('cp-table-select-total');
  var tableSelectSupplierEl = document.getElementById('cp-table-select-supplier');
  var clearSelectionBtn = document.getElementById('cp-clear-selection-btn');
  var openSelectBtn = document.getElementById('cp-open-select-btn');

  function expenseRows(){
    return Array.from(document.querySelectorAll('.cp-expense-row')).filter(function(row){
      return !row.hidden;
    });
  }

  var searchInput = document.getElementById('credit-payment-search');
  var searchChip = searchInput ? searchInput.closest('.cp-search-chip') : null;
  var entryCountEl = document.getElementById('cp-entry-count');

  function applyCreditPaymentSearch(){
    var needle = searchInput ? String(searchInput.value || '').trim().toLowerCase() : '';
    if (searchChip) searchChip.classList.toggle('is-active', !!needle);
    var rows = Array.from(document.querySelectorAll('#cp-outstanding-table tbody tr.cp-expense-row, #cp-history-table tbody tr.cp-history-row'));
    var visible = 0;
    rows.forEach(function(row){
      var hay = String(row.getAttribute('data-search') || row.textContent || '').toLowerCase();
      var match = !needle || hay.indexOf(needle) !== -1;
      row.hidden = !match;
      if (!match) {
        var check = row.querySelector('.cp-row-check');
        if (check) check.checked = false;
        row.classList.remove('is-selected');
      } else {
        visible += 1;
      }
    });
    if (entryCountEl) entryCountEl.textContent = visible + ' entries';
    if (typeof updateTableSelectionUi === 'function') updateTableSelectionUi();
  }

  if (searchInput) {
    searchInput.addEventListener('input', applyCreditPaymentSearch);
    searchInput.addEventListener('keydown', function(e){
      if (e.key === 'Escape') {
        searchInput.value = '';
        applyCreditPaymentSearch();
        searchInput.blur();
      }
      if (e.key === 'Enter') e.preventDefault();
    });
  }

  function selectedExpenseRows(){
    return expenseRows().filter(function(row){
      var check = row.querySelector('.cp-row-check');
      return check && check.checked;
    });
  }

  function uniqueSupplierSummary(rows){
    var names = [];
    var seen = {};
    rows.forEach(function(row){
      var name = row.getAttribute('data-supplier-name') || '';
      var id = String(row.getAttribute('data-supplier-id') || '');
      var key = id || name;
      if (!key || seen[key]) return;
      seen[key] = true;
      if (name) names.push(name);
    });
    if (!names.length) return '';
    if (names.length === 1) return '· ' + names[0];
    return '· ' + names.length + ' suppliers';
  }

  function updateTableSelectionUi(){
    var selected = selectedExpenseRows();
    var total = 0;
    selected.forEach(function(row){
      total += Number(row.getAttribute('data-balance') || 0);
    });

    expenseRows().forEach(function(row){
      var check = row.querySelector('.cp-row-check');
      row.classList.toggle('is-selected', !!(check && check.checked));
      row.classList.remove('is-locked-out');
      if (check) check.disabled = false;
    });

    var totalRows = expenseRows().length;
    if (selectAllCheck) {
      selectAllCheck.checked = totalRows > 0 && selected.length === totalRows;
      selectAllCheck.indeterminate = selected.length > 0 && selected.length < totalRows;
      selectAllCheck.disabled = totalRows === 0;
      selectAllCheck.title = 'Select all expenses';
      selectAllCheck.setAttribute('aria-label', 'Select all expenses');
      selectAllCheck.removeAttribute('data-supplier-complete');
    }

    if (tableSelectCountEl) {
      tableSelectCountEl.textContent = selected.length + ' selected';
    }
    if (tableSelectTotalEl) {
      tableSelectTotalEl.setAttribute('data-amount', String(total));
      tableSelectTotalEl.textContent = formatInr(total);
    }
    if (tableSelectSupplierEl) {
      tableSelectSupplierEl.textContent = uniqueSupplierSummary(selected);
    }
    if (selectionBar) selectionBar.hidden = selected.length === 0;
    if (openSelectBtn) openSelectBtn.disabled = selected.length === 0;
  }

  function setAllExpenseChecks(checked){
    expenseRows().forEach(function(row){
      var check = row.querySelector('.cp-row-check');
      if (check) check.checked = !!checked;
    });
    updateTableSelectionUi();
  }

  function clearTableSelection(){
    setAllExpenseChecks(false);
  }

  function collectSelectionsFromTable(){
    return selectedExpenseRows().map(function(row){ return selectionFromRow(row); });
  }

  if (outstandingTable) {
    outstandingTable.addEventListener('change', function(e){
      var target = e.target;
      if (!target) return;
      if (target.id === 'cp-select-all') {
        setAllExpenseChecks(!!target.checked);
        return;
      }
      if (target.classList.contains('cp-row-check')) {
        updateTableSelectionUi();
      }
    });

    outstandingTable.addEventListener('click', function(e){
      var row = e.target.closest('.cp-expense-row');
      if (!row || e.target.closest('a, button, label')) return;
      if (e.target.closest('input')) return;
      var check = row.querySelector('.cp-row-check');
      if (!check) return;
      check.checked = !check.checked;
      updateTableSelectionUi();
    });
  }

  if (clearSelectionBtn) {
    clearSelectionBtn.addEventListener('click', function(e){
      e.preventDefault();
      clearTableSelection();
    });
  }

  updateTableSelectionUi();

  /* ---------- Step 1: Select credit items (modal fallback) ---------- */
  var selectModal = document.getElementById('cp-select-modal');
  var selectBody = document.getElementById('cp-select-body');
  var selectError = document.getElementById('cp-select-error');
  var selectCountEl = document.getElementById('cp-select-count');
  var selectTotalEl = document.getElementById('cp-select-total');
  var selectSupplierEl = document.getElementById('cp-select-supplier');

  function renderSelectRows(preselectedIds){
    if (!selectBody) return;
    var preselected = {};
    (preselectedIds || []).forEach(function(id){ preselected[String(id)] = true; });
    selectBody.innerHTML = '';
    outstandingData.forEach(function(entry){
      var tr = document.createElement('tr');
      tr.className = 'cp-select-row';
      tr.setAttribute('data-expense-id', entry.id);
      tr.setAttribute('data-supplier-id', entry.supplier_id || '');
      tr.setAttribute('data-supplier-name', entry.supplier_name || '');
      tr.setAttribute('data-expense-code', entry.expense_code || '');
      tr.setAttribute('data-description', entry.description || '');
      tr.setAttribute('data-balance', entry.balance);
      var initiallyChecked = !!preselected[String(entry.id)];
      tr.innerHTML =
        '<td class="cp-col-check"><input type="checkbox" class="cp-select-check" aria-label="Select ' + escapeHtml(entry.expense_code || entry.id) + '"' + (initiallyChecked ? ' checked' : '') + '></td>' +
        '<td><span class="cp-alloc-code">' + escapeHtml(entry.expense_code || '—') + '</span><div class="pl-name">' + escapeHtml(entry.description || '—') + '</div></td>' +
        '<td class="pl-col-date">' + escapeHtml(entry.sales_date || '—') + '</td>' +
        '<td><div class="pl-name">' + escapeHtml(entry.supplier_name || '—') + '</div></td>' +
        '<td class="pl-col-amount">' + formatInr(entry.balance) + '</td>' +
        '<td class="pl-col-amount"><input class="cp-alloc-input cp-select-amount" type="number" min="0.01" step="0.01" max="' + entry.balance + '" value="' + entry.balance + '"' + (initiallyChecked ? '' : ' disabled') + '></td>';
      selectBody.appendChild(tr);
      var check = tr.querySelector('.cp-select-check');
      var amountInput = tr.querySelector('.cp-select-amount');
      check.addEventListener('change', function(){
        updateSelectUi();
        amountInput.disabled = !check.checked;
        if (!check.checked) amountInput.value = entry.balance;
      });
      amountInput.addEventListener('input', updateSelectUi);
    });
    updateSelectUi();
  }

  function selectedSelectRows(){
    return Array.from(document.querySelectorAll('.cp-select-row')).filter(function(row){
      var check = row.querySelector('.cp-select-check');
      return check && check.checked;
    });
  }

  function updateSelectUi(){
    var selected = selectedSelectRows();
    var total = 0;
    selected.forEach(function(row){
      var input = row.querySelector('.cp-select-amount');
      total += Number(input && input.value || 0);
    });

    document.querySelectorAll('.cp-select-row').forEach(function(row){
      var check = row.querySelector('.cp-select-check');
      row.classList.toggle('is-selected', !!(check && check.checked));
      row.classList.remove('is-locked-out');
      if (check) check.disabled = false;
    });

    if (selectCountEl) selectCountEl.textContent = selected.length + ' selected';
    if (selectTotalEl) {
      selectTotalEl.setAttribute('data-amount', String(total));
      selectTotalEl.textContent = formatInr(total);
    }
    if (selectSupplierEl) {
      selectSupplierEl.textContent = uniqueSupplierSummary(selected);
    }
  }

  function openSelectModal(preselectedIds){
    selectionSource = 'modal';
    setError(selectError, '');
    renderSelectRows(preselectedIds || []);
    openModal(selectModal);
  }

  if (openSelectBtn) {
    openSelectBtn.addEventListener('click', function(){
      var selections = collectSelectionsFromTable();
      if (!selections.length) {
        openSelectModal();
        return;
      }
      beginPaymentFromSelections(selections, 'table');
    });
  }
  var selectCancel = document.getElementById('cp-select-cancel');
  if (selectCancel) selectCancel.addEventListener('click', function(){ closeModal(selectModal); });
  if (selectModal) {
    selectModal.addEventListener('click', function(e){
      if (e.target === selectModal) closeModal(selectModal);
    });
  }

  /* ---------- Step 2: Payment details ---------- */
  var clearanceModal = document.getElementById('cp-clearance-modal');
  var clearanceError = document.getElementById('cp-clearance-error');
  var allocBody = document.getElementById('cp-alloc-body');
  var allocTotalEl = document.getElementById('cp-alloc-total');
  var allocSupplierEl = document.getElementById('cp-alloc-supplier');
  var paymentDateEl = document.getElementById('cp-payment-date');
  var paymentMethodEl = document.getElementById('cp-payment-method');
  var transactionWrap = document.getElementById('cp-transaction-wrap');
  var transactionEl = document.getElementById('cp-transaction-id');
  var notesEl = document.getElementById('cp-notes');
  var methodToggle = document.getElementById('cp-method-toggle');

  function syncTransactionVisibility(){
    if (!showPaymentMode) {
      if (transactionWrap) transactionWrap.hidden = true;
      if (transactionEl) transactionEl.value = '';
      return;
    }
    var method = paymentMethodEl ? paymentMethodEl.value : 'cash';
    if (transactionWrap) transactionWrap.hidden = method !== 'card';
    if (method !== 'card' && transactionEl) transactionEl.value = '';
  }

  if (methodToggle) {
    methodToggle.querySelectorAll('.staff-credit-type-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        methodToggle.querySelectorAll('.staff-credit-type-btn').forEach(function(other){
          other.classList.remove('active');
        });
        btn.classList.add('active');
        if (paymentMethodEl) paymentMethodEl.value = btn.getAttribute('data-value') || 'cash';
        syncTransactionVisibility();
      });
    });
  }

  function refreshAllocTotal(){
    if (!allocBody || !allocTotalEl) return;
    var total = 0;
    allocBody.querySelectorAll('.cp-alloc-input').forEach(function(input){
      total += Number(input.value || 0);
    });
    allocTotalEl.setAttribute('data-amount', String(total));
    allocTotalEl.textContent = formatInr(total);
  }

  function populatePaymentModal(selections){
    if (!allocBody) return;
    allocBody.innerHTML = '';
    var supplierNames = [];
    var seenSuppliers = {};
    selections.forEach(function(item){
      var key = String(item.supplier_id || '') + '|' + (item.supplier_name || '');
      if (seenSuppliers[key]) return;
      seenSuppliers[key] = true;
      if (item.supplier_name) supplierNames.push(item.supplier_name);
    });
    if (allocSupplierEl) {
      if (supplierNames.length <= 1) {
        allocSupplierEl.textContent = supplierNames[0] || '';
      } else {
        allocSupplierEl.textContent = supplierNames.length + ' suppliers';
      }
    }
    var multiSupplier = supplierNames.length > 1;
    selections.forEach(function(item){
      var tr = document.createElement('tr');
      tr.setAttribute('data-expense-id', item.expense_id);
      tr.setAttribute('data-supplier-id', item.supplier_id || '');
      tr.innerHTML =
        '<td><span class="cp-alloc-code">' + escapeHtml(item.expense_code || '—') + '</span>' +
        '<span>' + escapeHtml(item.description || '—') + '</span>' +
        (multiSupplier && item.supplier_name
          ? '<span class="cp-alloc-supplier">' + escapeHtml(item.supplier_name) + '</span>'
          : '') +
        '</td>' +
        '<td class="pl-col-amount">' + formatInr(item.balance) + '</td>' +
        '<td class="pl-col-amount"><input class="cp-alloc-input" type="number" min="0.01" step="0.01" max="' + item.balance + '" value="' + item.amount + '"></td>';
      allocBody.appendChild(tr);
      tr.querySelector('.cp-alloc-input').addEventListener('input', refreshAllocTotal);
    });
    refreshAllocTotal();
  }

  function collectSelectionsFromSelectModal(){
    var selections = [];
    var invalid = false;
    selectedSelectRows().forEach(function(row){
      var input = row.querySelector('.cp-select-amount');
      var amount = Number(input && input.value);
      var balance = Number(row.getAttribute('data-balance') || 0);
      if (!amount || amount <= 0 || amount > balance + 0.001) {
        invalid = true;
        return;
      }
      selections.push(selectionFromRow(row, amount));
    });
    return { selections: selections, invalid: invalid };
  }

  function beginPaymentFromSelections(selections, source){
    if (!selections.length) return;
    selectionSource = source || 'table';
    pendingSelections = selections;
    setError(selectError, '');
    setError(clearanceError, '');
    if (paymentDateEl) paymentDateEl.value = todayIso;
    if (paymentMethodEl) paymentMethodEl.value = 'cash';
    if (methodToggle) {
      methodToggle.querySelectorAll('.staff-credit-type-btn').forEach(function(btn){
        var active = btn.getAttribute('data-value') === 'cash';
        btn.classList.toggle('active', active);
      });
    }
    if (transactionEl) transactionEl.value = '';
    if (notesEl) notesEl.value = '';
    syncTransactionVisibility();
    populatePaymentModal(pendingSelections);
    closeModal(selectModal);
    openModal(clearanceModal);
  }

  function openPaymentModal(){
    var result = collectSelectionsFromSelectModal();
    if (!result.selections.length) {
      setError(selectError, labels.select_error_none || 'Select at least one expense.');
      return;
    }
    if (result.invalid) {
      setError(selectError, 'Enter a valid pay amount for each selected expense.');
      return;
    }
    beginPaymentFromSelections(result.selections, 'modal');
  }

  var selectContinue = document.getElementById('cp-select-continue');
  if (selectContinue) selectContinue.addEventListener('click', openPaymentModal);

  var clearanceBack = document.getElementById('cp-clearance-back');
  if (clearanceBack) clearanceBack.addEventListener('click', function(){
    closeModal(clearanceModal);
    if (selectionSource === 'modal') {
      openModal(selectModal);
    }
  });
  if (clearanceModal) {
    clearanceModal.addEventListener('click', function(e){
      if (e.target === clearanceModal) closeModal(clearanceModal);
    });
  }

  async function submitClearance(){
    if (!pendingSelections.length) {
      setError(clearanceError, 'Select at least one expense.');
      return;
    }
    var method = showPaymentMode && paymentMethodEl ? paymentMethodEl.value : 'cash';
    var transactionId = showPaymentMode && transactionEl ? transactionEl.value.trim() : '';
    if (showPaymentMode && method === 'card' && !transactionId) {
      setError(clearanceError, 'Transaction ID is required for bank transfer.');
      return;
    }
    var allocations = [];
    var invalid = false;
    allocBody.querySelectorAll('tr').forEach(function(tr, index){
      var input = tr.querySelector('.cp-alloc-input');
      var amount = Number(input && input.value);
      var pending = pendingSelections[index];
      var max = pending ? pending.balance : Number(input && input.getAttribute('max'));
      if (!amount || amount <= 0 || amount > max + 0.001) {
        invalid = true;
        return;
      }
      allocations.push({
        expense_id: Number(tr.getAttribute('data-expense-id')),
        amount: amount
      });
    });
    if (invalid || !allocations.length) {
      setError(clearanceError, 'Enter a valid pay amount for each expense.');
      return;
    }

    var pendingByExpense = {};
    pendingSelections.forEach(function(item){
      pendingByExpense[String(item.expense_id)] = item;
    });

    var submitBtn = document.getElementById('cp-clearance-submit');
    if (submitBtn) submitBtn.disabled = true;
    setError(clearanceError, '');
    try {
      // Backend requires one supplier per payment — group mixed selections.
      var groups = {};
      allocations.forEach(function(allocation){
        var pending = pendingByExpense[String(allocation.expense_id)];
        var supplierId = pending ? Number(pending.supplier_id || 0) : 0;
        if (!groups[supplierId]) groups[supplierId] = [];
        groups[supplierId].push(allocation);
      });
      var groupIds = Object.keys(groups);
      for (var i = 0; i < groupIds.length; i++) {
        var supplierId = Number(groupIds[i]);
        var res = await fetch(createUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            supplier_id: supplierId,
            payment_date: paymentDateEl ? paymentDateEl.value : todayIso,
            payment_method: method,
            transaction_id: transactionId,
            notes: notesEl ? notesEl.value.trim() : '',
            allocations: groups[groupIds[i]]
          })
        });
        var data = await res.json();
        if (!data.ok) {
          setError(clearanceError, data.error || labels.submit_error_record || 'Unable to record payment.');
          return;
        }
      }
      if (typeof window.deSoftRefresh === 'function') window.deSoftRefresh();
      else window.location.reload();
    } catch (err) {
      setError(clearanceError, labels.submit_error_network || 'Network error while recording payment.');
    } finally {
      if (submitBtn) submitBtn.disabled = false;
    }
  }

  var submitBtn = document.getElementById('cp-clearance-submit');
  if (submitBtn) submitBtn.addEventListener('click', submitClearance);

  /* ---------- History view / delete ---------- */
  var detailModal = document.getElementById('cp-detail-modal');
  var detailBody = document.getElementById('cp-detail-body');
  var detailError = document.getElementById('cp-detail-error');
  var detailClose = document.getElementById('cp-detail-close');

  function detailUrl(paymentId){
    return detailUrlTemplate.replace('/0', '/' + paymentId);
  }

  function renderPaymentDetail(payment){
    if (!detailBody) return;
    var methodLabel = methodLabels[payment.payment_method] || payment.payment_method;
    var accountLabel = payment.verification_account || '—';
    var rows = (payment.allocations || []).map(function(item){
      var cat = categoryLabels[item.category] || item.category || '—';
      return '<tr>' +
        '<td><span class="cp-alloc-code">' + escapeHtml(item.expense_code || '—') + '</span>' + escapeHtml(item.description || '—') +
        '<div class="pl-meta">' + escapeHtml(item.sales_date || '') + (cat && cat !== '—' ? ' · ' + cat : '') + '</div></td>' +
        '<td class="pl-col-amount">' + formatInr(item.amount) + '</td>' +
        '</tr>';
    }).join('');
    detailBody.innerHTML =
      '<div class="cp-detail-meta">' +
        '<div><span class="cp-detail-label">' + escapeHtml(labels.detail_date_label || 'Payment date') + '</span><span class="cp-detail-value">' + escapeHtml(payment.payment_date || '—') + '</span></div>' +
        '<div><span class="cp-detail-label">Supplier</span><span class="cp-detail-value">' + escapeHtml(payment.supplier_name || '—') + '</span></div>' +
        (showPaymentMode
          ? '<div><span class="cp-detail-label">' + escapeHtml((labels.clearance_mode_label || 'Payment mode *').replace(' *', '')) + '</span><span class="cp-detail-value">' + escapeHtml(methodLabel) + '</span></div>' +
            '<div><span class="cp-detail-label">Transaction ID</span><span class="cp-detail-value">' + escapeHtml(payment.transaction_id || '—') + '</span></div>'
          : '') +
        (showVerificationAccount
          ? '<div><span class="cp-detail-label">' + escapeHtml(labels.clearance_account_label || 'Account') + '</span><span class="cp-detail-value">' + escapeHtml(accountLabel) + '</span></div>'
          : '') +
        '<div><span class="cp-detail-label">Total</span><span class="cp-detail-value">' + formatInr(payment.total_amount) + '</span></div>' +
        '<div><span class="cp-detail-label">Notes</span><span class="cp-detail-value">' + escapeHtml(payment.notes || '—') + '</span></div>' +
      '</div>' +
      '<div class="cp-alloc-wrap">' +
        '<div class="cp-alloc-head"><span>Allocated expenses</span><span>' + ((payment.allocations || []).length) + '</span></div>' +
        '<div class="cp-alloc-table-wrap"><table class="cp-alloc-table"><thead><tr><th>Expense</th><th class="pl-col-amount">Paid</th></tr></thead><tbody>' +
        (rows || '<tr><td colspan="2">No allocations</td></tr>') +
        '</tbody></table></div>' +
      '</div>';
  }

  async function viewPayment(paymentId){
    setError(detailError, '');
    if (detailBody) detailBody.innerHTML = '<p>Loading…</p>';
    openModal(detailModal);
    try {
      var res = await fetch(detailUrl(paymentId));
      var data = await res.json();
      if (!data.ok) {
        setError(detailError, data.error || labels.detail_error_load || 'Unable to load payment.');
        return;
      }
      renderPaymentDetail(data.payment);
    } catch (err) {
      setError(detailError, labels.detail_error_network || 'Network error while loading payment.');
    }
  }

  async function deletePayment(paymentId){
    var ok = typeof window.deConfirm === 'function'
      ? await window.deConfirm(labels.delete_confirm || 'Delete this payment? Outstanding balances will be restored.')
      : window.confirm(labels.delete_confirm || 'Delete this payment? Outstanding balances will be restored.');
    if (!ok) return;
    try {
      var res = await fetch(deleteUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ payment_id: paymentId })
      });
      var data = await res.json();
      if (!data.ok) {
        window.alert(data.error || labels.delete_error || 'Unable to delete payment.');
        return;
      }
      if (typeof window.deSoftRefresh === 'function') window.deSoftRefresh();
      else window.location.reload();
    } catch (err) {
      window.alert(labels.delete_error_network || 'Network error while deleting payment.');
    }
  }

  document.querySelectorAll('.cp-view-payment').forEach(function(btn){
    btn.addEventListener('click', function(){ viewPayment(btn.getAttribute('data-payment-id')); });
  });
  document.querySelectorAll('.cp-delete-payment').forEach(function(btn){
    btn.addEventListener('click', function(){ deletePayment(btn.getAttribute('data-payment-id')); });
  });
  if (detailClose) detailClose.addEventListener('click', function(){ closeModal(detailModal); });
  if (detailModal) {
    detailModal.addEventListener('click', function(e){
      if (e.target === detailModal) closeModal(detailModal);
    });
  }

  /* ---------- Sortable table headers ---------- */
  function initSortableTable(table){
    if (!table) return;
    var tbody = table.tBodies[0];
    if (!tbody) return;
    var headers = Array.from(table.querySelectorAll('th.pl-sortable'));
    if (!headers.length) return;
    var activeKey = '';
    var ascending = true;

    function cellSortValue(row, colIndex, type){
      var cell = row.cells[colIndex];
      if (!cell) return type === 'number' ? 0 : '';
      var raw = cell.getAttribute('data-sort-value');
      if (raw == null || raw === '') raw = (cell.textContent || '').trim();
      if (type === 'number') {
        var n = Number(raw);
        return isFinite(n) ? n : 0;
      }
      return String(raw).toLowerCase();
    }

    function sortBy(th){
      var key = th.getAttribute('data-sort') || '';
      var type = th.getAttribute('data-sort-type') || 'text';
      var colIndex = Array.from(th.parentNode.children).indexOf(th);
      if (colIndex < 0) return;

      if (activeKey === key) ascending = !ascending;
      else {
        activeKey = key;
        ascending = true;
      }

      var rows = Array.from(tbody.rows);
      rows.sort(function(a, b){
        var av = cellSortValue(a, colIndex, type);
        var bv = cellSortValue(b, colIndex, type);
        var cmp = type === 'number'
          ? av - bv
          : String(av).localeCompare(String(bv), undefined, { numeric: true, sensitivity: 'base' });
        return ascending ? cmp : -cmp;
      });
      rows.forEach(function(row){ tbody.appendChild(row); });

      headers.forEach(function(header){
        header.classList.remove('is-sorted-asc', 'is-sorted-desc');
        header.setAttribute('aria-sort', 'none');
      });
      th.classList.add(ascending ? 'is-sorted-asc' : 'is-sorted-desc');
      th.setAttribute('aria-sort', ascending ? 'ascending' : 'descending');
    }

    headers.forEach(function(th){
      th.addEventListener('click', function(){ sortBy(th); });
      th.addEventListener('keydown', function(e){
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          sortBy(th);
        }
      });
    });
  }

  initSortableTable(document.getElementById('cp-outstanding-table'));
  initSortableTable(document.querySelector('table.cp-table'));
})();
</script>
