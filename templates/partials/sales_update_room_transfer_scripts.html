<script src="{{ url_for('static', filename='format_inr.js') }}"></script>
<script>
(function(){
  var page = document.getElementById('room-transfer-page');
  var widget = document.getElementById('room-transfer-widget');
  var statusEl = document.getElementById('room-transfer-save-status');
  var totalEl = document.getElementById('room-transfer-total');
  var paidEl = document.getElementById('room-transfer-paid');
  var unpaidEl = document.getElementById('room-transfer-unpaid');
  var totalCountEl = document.getElementById('room-transfer-total-count');
  var paidCountEl = document.getElementById('room-transfer-paid-count');
  var unpaidCountEl = document.getElementById('room-transfer-unpaid-count');
  var entryCountEl = document.getElementById('room-transfer-entry-count');
  var wrapEl = document.getElementById('room-transfer-wrap');
  var filterForm = document.getElementById('room-transfer-filter-form');
  var dateFrom = document.getElementById('room-transfer-date-from');
  var dateTo = document.getElementById('room-transfer-date-to');
  var statusFilter = widget ? String(widget.dataset.status || 'unpaid') : 'unpaid';
  var locationFilter = widget ? String(widget.dataset.location || 'All') : 'All';
  var dateFromVal = widget ? String(widget.dataset.dateFrom || '') : '';
  var dateToVal = widget ? String(widget.dataset.dateTo || '') : '';
  var createUrl = page ? String(page.getAttribute('data-create-url') || '') : '';
  var reverseUrl = page ? String(page.getAttribute('data-reverse-url') || '') : '';
  var todayIso = page ? String(page.getAttribute('data-today') || '') : '';

  var selectAllCheck = document.getElementById('rt-select-all');
  var selectionBar = document.getElementById('rt-selection-bar');
  var tableSelectCountEl = document.getElementById('rt-table-select-count');
  var tableSelectTotalEl = document.getElementById('rt-table-select-total');
  var clearSelectionBtn = document.getElementById('rt-clear-selection-btn');
  var statusActionBtn = document.getElementById('rt-status-action-btn');
  var actionMode = statusActionBtn ? String(statusActionBtn.getAttribute('data-action') || 'clear') : 'clear';
  var actionIdleLabel = statusActionBtn
    ? String(statusActionBtn.getAttribute('data-idle-label') || statusActionBtn.textContent || 'Clear Payment')
    : 'Clear Payment';
  var actionBusy = false;

  var clearanceModal = document.getElementById('rt-clearance-modal');
  var clearanceError = document.getElementById('rt-clearance-error');
  var paymentDateEl = document.getElementById('rt-payment-date');
  var paymentSplitsEl = document.getElementById('rt-payment-splits');
  var addSplitBtn = document.getElementById('rt-add-split-btn');
  var splitBalanceEl = document.getElementById('rt-split-balance');
  var splitTotalEl = document.getElementById('rt-split-total');
  var splitTargetEl = document.getElementById('rt-split-target');
  var notesEl = document.getElementById('rt-notes');
  var allocBody = document.getElementById('rt-alloc-body');
  var allocMetaEl = document.getElementById('rt-alloc-meta');
  var allocTotalEl = document.getElementById('rt-alloc-total');
  var pendingSelections = [];
  var paymentMethods = [];
  try {
    var methodsData = document.getElementById('rt-payment-methods-data');
    paymentMethods = methodsData ? JSON.parse(methodsData.textContent || '[]') : [];
  } catch (err) {
    paymentMethods = [];
  }
  if (!paymentMethods.length) {
    paymentMethods = [
      ['bank_transfer', 'Bank Transfer'],
      ['cash', 'Cash'],
      ['upi', 'UPI'],
      ['card', 'Card']
    ];
  }
  var methodsRequiringTxn = { bank_transfer: true };

  function formatInrKpi(value){
    if (typeof window.formatInr === 'function') return window.formatInr(value, 0);
    var n = Number(value || 0);
    if (!isFinite(n)) return '₹0';
    return (n < 0 ? '−' : '') + '₹' + Math.abs(n).toLocaleString('en-IN', { maximumFractionDigits: 0 });
  }

  function formatMoneyNodes(root){
    (root || document).querySelectorAll('[data-amount]').forEach(function(el){
      if (el.closest && el.closest('tr.room-transfer-row') && el.tagName === 'TR') return;
      el.textContent = formatInrKpi(el.getAttribute('data-amount'));
    });
    if (typeof scheduleFitKpiValues === 'function') scheduleFitKpiValues();
  }
  formatMoneyNodes(document);

  function escapeHtml(value){
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function setError(el, message){
    if (!el) return;
    if (message) {
      el.textContent = message;
      el.style.display = 'block';
    } else {
      el.textContent = '';
      el.style.display = 'none';
    }
  }

  function openModal(el){
    if (!el) return;
    el.classList.add('open');
    el.setAttribute('aria-hidden', 'false');
  }

  function closeModal(el){
    if (!el) return;
    el.classList.remove('open');
    el.setAttribute('aria-hidden', 'true');
  }

  function transferWord(count){
    return Number(count || 0) === 1 ? 'transfer' : 'transfers';
  }

  function updateSummary(summaryRollup){
    var rollup = summaryRollup || {};
    if (totalEl) {
      totalEl.setAttribute('data-amount', String(rollup.total_amount || 0));
      totalEl.textContent = formatInrKpi(rollup.total_amount || 0);
    }
    if (paidEl) {
      paidEl.setAttribute('data-amount', String(rollup.paid_amount || 0));
      paidEl.textContent = formatInrKpi(rollup.paid_amount || 0);
    }
    if (unpaidEl) {
      unpaidEl.setAttribute('data-amount', String(rollup.unpaid_amount || 0));
      unpaidEl.textContent = formatInrKpi(rollup.unpaid_amount || 0);
    }
    if (totalCountEl) totalCountEl.textContent = (rollup.total_count || 0) + ' ' + transferWord(rollup.total_count);
    if (paidCountEl) paidCountEl.textContent = (rollup.paid_count || 0) + ' ' + transferWord(rollup.paid_count);
    if (unpaidCountEl) unpaidCountEl.textContent = (rollup.unpaid_count || 0) + ' ' + transferWord(rollup.unpaid_count);
    var body = document.getElementById('room-transfer-body');
    var visible = body ? body.querySelectorAll('tr').length : 0;
    if (entryCountEl) entryCountEl.textContent = visible + ' entries';
    if (typeof scheduleFitKpiValues === 'function') scheduleFitKpiValues();
  }

  function emptyStateMessage(){
    var locationSuffix = locationFilter === 'All' ? '' : (' for ' + locationFilter);
    if (statusFilter === 'paid') {
      return 'No paid room transfers found' + locationSuffix + ' for the selected dates.';
    }
    if (statusFilter === 'unpaid') {
      return 'No pending room transfers' + locationSuffix + ' for the selected dates. Upload a Collections report on Sales Update - Bar or Restaurant to import room credit lines.';
    }
    return 'No room transfers found' + locationSuffix + ' for the selected dates. Upload a Collections report on Sales Update - Bar or Restaurant to import room credit lines.';
  }

  function showEmptyState(){
    if (!wrapEl) return;
    wrapEl.innerHTML = '<div class="pl-empty" id="room-transfer-empty">' + emptyStateMessage() + '</div>';
    if (entryCountEl) entryCountEl.textContent = '0 entries';
    if (selectionBar) selectionBar.hidden = true;
    if (statusActionBtn) {
      statusActionBtn.disabled = true;
      statusActionBtn.hidden = true;
    }
    if (selectAllCheck) selectAllCheck.disabled = true;
  }

  function selectableRows(){
    return Array.from(document.querySelectorAll('.rt-selectable-row')).filter(function(row){
      return !row.hidden;
    });
  }

  function selectedRows(){
    return selectableRows().filter(function(row){
      var check = row.querySelector('.rt-row-check');
      return check && check.checked;
    });
  }

  function selectionFromRow(row){
    var balance = Number(row.getAttribute('data-balance') || 0);
    return {
      entry_id: Number(row.getAttribute('data-entry-id')),
      balance: balance,
      amount: balance,
      invoice_number: row.getAttribute('data-invoice') || '',
      guest_name: row.getAttribute('data-guest') || '',
      location: row.getAttribute('data-location') || '',
    };
  }

  function updateTableSelectionUi(){
    var selected = selectedRows();
    var total = 0;
    selected.forEach(function(row){
      total += Number(row.getAttribute('data-balance') || 0);
    });

    selectableRows().forEach(function(row){
      var check = row.querySelector('.rt-row-check');
      row.classList.toggle('is-selected', !!(check && check.checked));
    });

    var totalRows = selectableRows().length;
    if (selectAllCheck) {
      selectAllCheck.checked = totalRows > 0 && selected.length === totalRows;
      selectAllCheck.indeterminate = selected.length > 0 && selected.length < totalRows;
      selectAllCheck.disabled = totalRows === 0 || actionBusy;
    }

    if (tableSelectCountEl) tableSelectCountEl.textContent = selected.length + ' selected';
    if (tableSelectTotalEl) {
      tableSelectTotalEl.setAttribute('data-amount', String(total));
      tableSelectTotalEl.textContent = formatInrKpi(total);
    }
    if (selectionBar) selectionBar.hidden = selected.length === 0;
    if (statusActionBtn) statusActionBtn.disabled = selected.length === 0 || actionBusy;
  }

  function setAllChecks(checked){
    selectableRows().forEach(function(row){
      var check = row.querySelector('.rt-row-check');
      if (check && !check.disabled) check.checked = !!checked;
    });
    updateTableSelectionUi();
  }

  function paymentTotal(){
    if (!allocTotalEl) return 0;
    return Number(allocTotalEl.getAttribute('data-amount') || 0);
  }

  function splitRows(){
    return paymentSplitsEl ? Array.from(paymentSplitsEl.querySelectorAll('.rt-split-row')) : [];
  }

  function methodLabel(key){
    if (!key) return 'Select payment mode';
    for (var i = 0; i < paymentMethods.length; i++) {
      if (paymentMethods[i][0] === key) return paymentMethods[i][1];
    }
    return key;
  }

  function rowMethodValue(row){
    if (!row) return '';
    var input = row.querySelector('.rt-split-method-input');
    return input ? String(input.value || '') : '';
  }

  function usedMethods(exceptRow){
    var used = {};
    splitRows().forEach(function(row){
      if (row === exceptRow) return;
      var value = rowMethodValue(row);
      if (value) used[value] = true;
    });
    return used;
  }

  function firstAvailableMethod(exceptRow){
    var used = usedMethods(exceptRow);
    for (var i = 0; i < paymentMethods.length; i++) {
      if (!used[paymentMethods[i][0]]) return paymentMethods[i][0];
    }
    return '';
  }

  function methodOptionsHtml(selected, exceptRow){
    var used = usedMethods(exceptRow);
    return paymentMethods.map(function(pair){
      var key = pair[0];
      var label = pair[1];
      if (used[key] && key !== selected) return '';
      var on = key === selected;
      return '<button type="button" class="se-filter-listbox-option' + (on ? ' is-selected' : '') + '" role="option" data-value="' + escapeHtml(key) + '" aria-selected="' + (on ? 'true' : 'false') + '">' + escapeHtml(label) + '</button>';
    }).join('');
  }

  function closeSplitListbox(root){
    if (!root) return;
    var trigger = root.querySelector('.se-filter-chip-trigger');
    var list = root.querySelector('.se-filter-listbox');
    root.classList.remove('is-open');
    if (trigger) trigger.setAttribute('aria-expanded', 'false');
    if (list) {
      list.hidden = true;
      list.scrollTop = 0;
    }
  }

  function closeAllSplitListboxes(except){
    if (!paymentSplitsEl) return;
    paymentSplitsEl.querySelectorAll('[data-se-listbox].is-open').forEach(function(root){
      if (root !== except) closeSplitListbox(root);
    });
  }

  function openSplitListbox(root){
    if (!root || root.classList.contains('is-disabled')) return;
    closeAllSplitListboxes(root);
    var trigger = root.querySelector('.se-filter-chip-trigger');
    var list = root.querySelector('.se-filter-listbox');
    root.classList.add('is-open');
    if (trigger) trigger.setAttribute('aria-expanded', 'true');
    if (list) {
      list.hidden = false;
      var selected = list.querySelector('[aria-selected="true"]') || list.querySelector('.se-filter-listbox-option');
      if (selected) selected.focus({ preventScroll: true });
    }
  }

  function syncSplitRowState(row){
    if (!row) return;
    var txn = row.querySelector('.rt-split-txn');
    var method = rowMethodValue(row);
    var needsTxn = !!(method && methodsRequiringTxn[method]);
    row.classList.toggle('is-bank', needsTxn);
    if (txn) {
      txn.hidden = !needsTxn;
      if (!needsTxn) txn.value = '';
    }
  }

  function refreshSplitOptionAvailability(){
    splitRows().forEach(function(row){
      var listbox = row.querySelector('[data-se-listbox]');
      var list = row.querySelector('.se-filter-listbox');
      var selected = rowMethodValue(row);
      if (list) list.innerHTML = methodOptionsHtml(selected, row);
      if (listbox && listbox.classList.contains('is-open')) {
        var selectedOpt = list && (list.querySelector('[aria-selected="true"]') || list.querySelector('.se-filter-listbox-option'));
        if (selectedOpt) selectedOpt.focus({ preventScroll: true });
      }
      syncSplitRowState(row);
    });
    if (addSplitBtn) addSplitBtn.disabled = splitRows().length >= paymentMethods.length;
  }

  function bindSplitListbox(row){
    var root = row.querySelector('[data-se-listbox]');
    if (!root || root.getAttribute('data-bound') === '1') return;
    root.setAttribute('data-bound', '1');
    var trigger = root.querySelector('.se-filter-chip-trigger');
    var list = root.querySelector('.se-filter-listbox');
    var hidden = root.querySelector('.rt-split-method-input');
    var valueEl = root.querySelector('.se-filter-chip-value');
    if (!trigger || !list || !hidden) return;

    trigger.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      if (root.classList.contains('is-open')) closeSplitListbox(root);
      else openSplitListbox(root);
    });
    trigger.addEventListener('keydown', function(e){
      if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openSplitListbox(root);
      } else if (e.key === 'Escape') {
        closeSplitListbox(root);
      }
    });
    list.addEventListener('click', function(e){
      var option = e.target.closest('.se-filter-listbox-option');
      if (!option || !list.contains(option)) return;
      e.preventDefault();
      var value = option.getAttribute('data-value') || '';
      var label = (option.textContent || '').trim();
      hidden.value = value;
      if (valueEl) {
        valueEl.textContent = label || methodLabel(value);
        valueEl.classList.toggle('staff-supplier-placeholder', !value);
      }
      list.querySelectorAll('.se-filter-listbox-option').forEach(function(opt){
        var on = opt === option;
        opt.classList.toggle('is-selected', on);
        opt.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      closeSplitListbox(root);
      syncSplitRowState(row);
      refreshSplitOptionAvailability();
      syncSubmitEnabled();
    });
    list.addEventListener('keydown', function(e){
      var options = Array.from(list.querySelectorAll('.se-filter-listbox-option'));
      if (!options.length) return;
      var idx = options.indexOf(document.activeElement);
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        options[Math.min(options.length - 1, Math.max(0, idx) + 1)].focus();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        options[Math.max(0, (idx < 0 ? 0 : idx) - 1)].focus();
      } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (idx >= 0) options[idx].click();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        closeSplitListbox(root);
        trigger.focus();
      }
    });
  }

  function allSplitModesSelected(){
    var rows = splitRows();
    if (!rows.length) return false;
    for (var i = 0; i < rows.length; i++) {
      if (!rowMethodValue(rows[i])) return false;
    }
    return true;
  }

  function markIncompleteSplitModes(){
    splitRows().forEach(function(row){
      var listbox = row.querySelector('.rt-split-method-listbox');
      if (!listbox) return;
      listbox.classList.toggle('is-incomplete', !rowMethodValue(row));
    });
  }

  function splitsMatchPaymentTotal(){
    var rows = splitRows();
    var target = paymentTotal();
    if (!rows.length || target <= 0) return false;
    if (!allSplitModesSelected()) return false;
    if (rows.length === 1) return true;
    var total = 0;
    var complete = true;
    rows.forEach(function(row){
      var amountInput = row.querySelector('.rt-split-amount');
      var raw = amountInput ? String(amountInput.value || '').trim() : '';
      var amount = Number(raw);
      if (!raw || !isFinite(amount) || amount <= 0) complete = false;
      total += isFinite(amount) ? amount : 0;
    });
    return complete && Math.abs(total - target) <= 0.001;
  }

  function syncSubmitEnabled(){
    var submitBtn = document.getElementById('rt-clearance-submit');
    if (!submitBtn) return;
    var rows = splitRows();
    var ok = paymentTotal() > 0 && splitsMatchPaymentTotal();
    if (ok) {
      rows.forEach(function(row){
        var method = rowMethodValue(row);
        var txnInput = row.querySelector('.rt-split-txn');
        if (methodsRequiringTxn[method] && !(txnInput && txnInput.value.trim())) ok = false;
      });
    }
    markIncompleteSplitModes();
    submitBtn.disabled = !ok;
    submitBtn.setAttribute('aria-disabled', ok ? 'false' : 'true');
  }

  function roundMoney(value){
    return Math.round(Number(value || 0) * 100) / 100;
  }

  function syncRemainingSplitAmount(changedRow){
    var rows = splitRows();
    if (rows.length < 2) return;
    var target = paymentTotal();
    if (!(target > 0)) return;

    function amountRaw(row){
      var input = row.querySelector('.rt-split-amount');
      return input ? String(input.value || '').trim() : '';
    }
    function setAmount(row, value){
      var input = row.querySelector('.rt-split-amount');
      if (!input) return;
      input.value = value > 0 ? String(value) : '';
    }

    // Two modes: editing either row fills the other with the remainder.
    if (rows.length === 2) {
      var first = rows[0];
      var second = rows[1];
      if (!changedRow) {
        var firstRaw = amountRaw(first);
        var secondRaw = amountRaw(second);
        var firstAmt = Number(firstRaw);
        var secondAmt = Number(secondRaw);
        if (firstRaw && isFinite(firstAmt) && firstAmt > 0 && !secondRaw) {
          setAmount(second, roundMoney(target - firstAmt));
        } else if (secondRaw && isFinite(secondAmt) && secondAmt > 0 && !firstRaw) {
          setAmount(first, roundMoney(target - secondAmt));
        }
        return;
      }
      var otherRow = changedRow === first ? second : first;
      var raw = amountRaw(changedRow);
      var amount = Number(raw);
      if (!raw || !isFinite(amount) || amount <= 0) {
        setAmount(otherRow, 0);
        return;
      }
      setAmount(otherRow, roundMoney(target - amount));
      return;
    }

    // 3+ modes: keep filling the last row from the earlier amounts.
    var lastRow = rows[rows.length - 1];
    if (changedRow && changedRow === lastRow) return;
    var others = 0;
    var hasEarlierAmount = false;
    for (var i = 0; i < rows.length - 1; i++) {
      var rawEarlier = amountRaw(rows[i]);
      var amountEarlier = Number(rawEarlier);
      if (rawEarlier && isFinite(amountEarlier) && amountEarlier > 0) {
        hasEarlierAmount = true;
        others += amountEarlier;
      }
    }
    if (!hasEarlierAmount) {
      setAmount(lastRow, 0);
      return;
    }
    setAmount(lastRow, roundMoney(target - others));
  }

  function refreshSplitBalance(){
    var rows = splitRows();
    var multi = rows.length > 1;
    if (splitBalanceEl) splitBalanceEl.hidden = !multi;
    var total = 0;
    var allFilled = true;
    var modesSelected = true;
    rows.forEach(function(row){
      if (!rowMethodValue(row)) modesSelected = false;
      var amountInput = row.querySelector('.rt-split-amount');
      var raw = amountInput ? String(amountInput.value || '').trim() : '';
      var amount = Number(raw);
      if (multi && (!raw || !isFinite(amount) || amount <= 0)) allFilled = false;
      total += isFinite(amount) ? amount : 0;
    });
    var target = paymentTotal();
    if (splitTotalEl) {
      splitTotalEl.setAttribute('data-amount', String(total));
      splitTotalEl.textContent = formatInrKpi(total);
    }
    if (splitTargetEl) {
      splitTargetEl.setAttribute('data-amount', String(target));
      splitTargetEl.textContent = formatInrKpi(target);
    }
    if (splitBalanceEl) {
      var mismatch = multi && (!allFilled || !modesSelected || Math.abs(total - target) > 0.001);
      splitBalanceEl.classList.toggle('is-mismatch', mismatch);
    }
    syncSubmitEnabled();
  }

  function syncSingleSplitAmount(){
    var rows = splitRows();
    if (rows.length !== 1) {
      syncRemainingSplitAmount(null);
      refreshSplitBalance();
      return;
    }
    var amountInput = rows[0].querySelector('.rt-split-amount');
    if (amountInput) amountInput.value = String(paymentTotal() || '');
    refreshSplitBalance();
  }

  function addSplitRow(preferredMethod, amount){
    if (!paymentSplitsEl) return;
    if (splitRows().length >= paymentMethods.length) return;
    var method = preferredMethod == null ? '' : String(preferredMethod || '');
    if (method && usedMethods(null)[method]) method = '';
    var label = methodLabel(method);
    var uid = 'rt-split-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
    var row = document.createElement('div');
    row.className = 'rt-split-row';
    row.innerHTML =
      '<div class="se-filter-chip se-filter-chip--location se-filter-chip--listbox rt-split-method-listbox" data-se-listbox>' +
        '<div class="se-filter-chip-control">' +
          '<span class="se-filter-chip-icon" aria-hidden="true">' +
            '<svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>' +
          '</span>' +
          '<input type="hidden" class="rt-split-method-input" value="' + escapeHtml(method) + '">' +
          '<button type="button" class="se-filter-chip-trigger" id="' + uid + '-trigger" aria-haspopup="listbox" aria-expanded="false" aria-controls="' + uid + '-list" aria-label="Payment mode">' +
            '<span class="se-filter-chip-value' + (method ? '' : ' staff-supplier-placeholder') + '">' + escapeHtml(label) + '</span>' +
          '</button>' +
          '<span class="se-filter-chip-chev" aria-hidden="true">' +
            '<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>' +
          '</span>' +
        '</div>' +
        '<div class="se-filter-listbox" id="' + uid + '-list" role="listbox" aria-label="Payment mode" hidden>' +
          methodOptionsHtml(method, null) +
        '</div>' +
      '</div>' +
      '<input class="staff-input rt-split-amount" type="number" min="0.01" step="0.01" placeholder="Amount" aria-label="Mode amount" value="' + escapeHtml(amount == null ? '' : amount) + '">' +
      '<input class="staff-input rt-split-txn" type="text" placeholder="Txn / UTR ID" aria-label="Transaction ID" hidden autocomplete="off">' +
      '<button type="button" class="rt-split-remove" aria-label="Remove payment mode" hidden>&times;</button>';
    paymentSplitsEl.appendChild(row);

    var amountInput = row.querySelector('.rt-split-amount');
    var txnInput = row.querySelector('.rt-split-txn');
    var removeBtn = row.querySelector('.rt-split-remove');
    bindSplitListbox(row);
    if (amountInput) {
      amountInput.addEventListener('input', function(){
        syncRemainingSplitAmount(row);
        refreshSplitBalance();
      });
    }
    if (txnInput) txnInput.addEventListener('input', syncSubmitEnabled);
    if (removeBtn) {
      removeBtn.addEventListener('click', function(){
        if (splitRows().length <= 1) return;
        closeAllSplitListboxes();
        row.remove();
        updateSplitRemoveButtons();
        refreshSplitOptionAvailability();
        syncSingleSplitAmount();
      });
    }
    syncSplitRowState(row);
    updateSplitRemoveButtons();
    refreshSplitOptionAvailability();
    refreshSplitBalance();
  }

  function updateSplitRemoveButtons(){
    var rows = splitRows();
    var multi = rows.length > 1;
    rows.forEach(function(row){
      var removeBtn = row.querySelector('.rt-split-remove');
      var amountInput = row.querySelector('.rt-split-amount');
      if (removeBtn) removeBtn.hidden = !multi;
      if (amountInput) {
        amountInput.hidden = !multi;
        amountInput.required = multi;
      }
      row.classList.toggle('is-multi', multi);
    });
  }

  function resetPaymentSplits(){
    closeAllSplitListboxes();
    if (paymentSplitsEl) paymentSplitsEl.innerHTML = '';
    addSplitRow('', '');
    syncSingleSplitAmount();
  }

  function collectPaymentSplits(){
    var splits = [];
    var invalid = '';
    var rows = splitRows();
    var target = paymentTotal();
    if (!(target > 0)) {
      return { splits: [], error: 'Payment total must be greater than zero.' };
    }
    rows.forEach(function(row){
      if (invalid) return;
      var amountInput = row.querySelector('.rt-split-amount');
      var txnInput = row.querySelector('.rt-split-txn');
      var method = rowMethodValue(row);
      var amount = rows.length === 1 ? target : Number(amountInput && amountInput.value);
      var transactionId = txnInput ? txnInput.value.trim() : '';
      if (!method) {
        invalid = 'Select a payment mode for each row.';
        return;
      }
      if (!amount || amount <= 0) {
        invalid = 'Enter a valid amount for each payment mode.';
        return;
      }
      if (methodsRequiringTxn[method] && !transactionId) {
        invalid = 'Transaction ID is required for bank transfer.';
        return;
      }
      splits.push({
        payment_method: method,
        amount: amount,
        transaction_id: transactionId
      });
    });
    if (invalid) return { splits: [], error: invalid };
    var splitSum = splits.reduce(function(sum, item){ return sum + Number(item.amount || 0); }, 0);
    if (Math.abs(splitSum - target) > 0.001) {
      return {
        splits: [],
        error: 'Modes total must equal the payment total before saving.'
      };
    }
    return { splits: splits, error: '' };
  }

  function refreshAllocTotal(){
    if (!allocBody || !allocTotalEl) return;
    var total = 0;
    allocBody.querySelectorAll('.cp-alloc-input').forEach(function(input){
      total += Number(input.value || 0);
    });
    allocTotalEl.setAttribute('data-amount', String(total));
    allocTotalEl.textContent = formatInrKpi(total);
    syncSingleSplitAmount();
  }

  function populatePaymentModal(selections){
    if (!allocBody) return;
    allocBody.innerHTML = '';
    if (allocMetaEl) {
      allocMetaEl.textContent = selections.length === 1
        ? (selections[0].invoice_number || '1 transfer')
        : (selections.length + ' transfers');
    }
    selections.forEach(function(item){
      var tr = document.createElement('tr');
      tr.setAttribute('data-entry-id', item.entry_id);
      tr.innerHTML =
        '<td><span class="cp-alloc-code">' + escapeHtml(item.invoice_number || '—') + '</span>' +
        '<span>' + escapeHtml(item.guest_name || '—') + '</span>' +
        (item.location ? '<span class="cp-alloc-supplier">' + escapeHtml(item.location) + '</span>' : '') +
        '</td>' +
        '<td class="pl-col-amount">' + formatInrKpi(item.balance) + '</td>' +
        '<td class="pl-col-amount"><input class="cp-alloc-input" type="number" min="0.01" step="0.01" max="' + item.balance + '" value="' + item.amount + '"></td>';
      allocBody.appendChild(tr);
      tr.querySelector('.cp-alloc-input').addEventListener('input', refreshAllocTotal);
    });
    refreshAllocTotal();
  }

  function beginPaymentFromSelections(selections){
    if (!selections.length) return;
    pendingSelections = selections;
    setError(clearanceError, '');
    if (paymentDateEl) paymentDateEl.value = todayIso;
    if (notesEl) notesEl.value = '';
    populatePaymentModal(pendingSelections);
    resetPaymentSplits();
    openModal(clearanceModal);
  }

  async function submitClearance(){
    if (!pendingSelections.length) {
      setError(clearanceError, 'Select at least one room transfer.');
      return;
    }
    if (!createUrl) {
      setError(clearanceError, 'Payment endpoint is not available.');
      return;
    }
    if (!allSplitModesSelected()) {
      markIncompleteSplitModes();
      setError(clearanceError, 'Select a payment mode for each row.');
      syncSubmitEnabled();
      return;
    }
    var allocations = [];
    var invalid = false;
    allocBody.querySelectorAll('tr').forEach(function(tr, index){
      var input = tr.querySelector('.cp-alloc-input');
      var amount = Number(input && input.value);
      var pending = pendingSelections[index];
      var max = pending ? pending.balance : Number(input && input.getAttribute('max'));
      if (!amount || amount <= 0 || amount > max + 0.001) {
        invalid = true;
        return;
      }
      allocations.push({
        entry_id: Number(tr.getAttribute('data-entry-id')),
        amount: amount
      });
    });
    if (invalid || !allocations.length) {
      setError(clearanceError, 'Enter a valid pay amount for each transfer.');
      return;
    }

    var splitResult = collectPaymentSplits();
    if (splitResult.error) {
      setError(clearanceError, splitResult.error);
      syncSubmitEnabled();
      return;
    }
    var splits = splitResult.splits;
    if (!splits.length) {
      setError(clearanceError, 'Add at least one payment mode.');
      return;
    }

    var submitBtn = document.getElementById('rt-clearance-submit');
    if (submitBtn) submitBtn.disabled = true;
    setError(clearanceError, '');
    try {
      var res = await fetch(createUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          company: widget ? widget.dataset.company : '',
          payment_date: paymentDateEl ? paymentDateEl.value : todayIso,
          notes: notesEl ? notesEl.value.trim() : '',
          allocations: allocations,
          payment_splits: splits
        })
      });
      var data = await res.json().catch(function(){ return {}; });
      if (!res.ok || !data.ok) {
        setError(clearanceError, data.error || 'Unable to record payment.');
        return;
      }
      if (typeof window.deSoftRefresh === 'function') window.deSoftRefresh();
      else window.location.reload();
    } catch (err) {
      setError(clearanceError, 'Network error while recording payment.');
    } finally {
      syncSubmitEnabled();
    }
  }

  async function reverseSelectedPayments(){
    if (!widget || actionBusy || !reverseUrl) return;
    var selected = selectedRows();
    if (!selected.length) return;
    var entryIds = selected.map(function(row){
      return Number(row.getAttribute('data-entry-id'));
    }).filter(Boolean);
    if (!entryIds.length) return;

    actionBusy = true;
    updateTableSelectionUi();
    if (statusActionBtn) statusActionBtn.textContent = 'Reversing…';
    if (statusEl) statusEl.textContent = 'Reversing payment…';

    try {
      var res = await fetch(reverseUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          company: widget.dataset.company,
          entry_ids: entryIds,
        }),
      });
      var data = await res.json().catch(function(){ return {}; });
      if (!res.ok || !data.ok) throw new Error(data.error || 'Could not mark Un Paid.');
      if (typeof window.deSoftRefresh === 'function') window.deSoftRefresh();
      else window.location.reload();
    } catch (err) {
      if (statusEl) statusEl.textContent = err.message || 'Save failed';
      actionBusy = false;
      if (statusActionBtn) statusActionBtn.textContent = actionIdleLabel;
      updateTableSelectionUi();
    }
  }

  function onPrimaryAction(){
    if (actionMode === 'reverse') {
      reverseSelectedPayments();
      return;
    }
    var selections = selectedRows().map(selectionFromRow).filter(function(item){
      return item.entry_id && item.balance > 0;
    });
    if (!selections.length) return;
    beginPaymentFromSelections(selections);
  }

  if (selectAllCheck) {
    selectAllCheck.addEventListener('change', function(){
      setAllChecks(selectAllCheck.checked);
    });
  }
  if (clearSelectionBtn) {
    clearSelectionBtn.addEventListener('click', function(){ setAllChecks(false); });
  }
  if (statusActionBtn) {
    statusActionBtn.addEventListener('click', onPrimaryAction);
  }

  if (addSplitBtn) {
    addSplitBtn.addEventListener('click', function(){
      var rows = splitRows();
      // Keep the already selected mode; clear amounts so the split can be entered fresh.
      if (rows.length === 1) {
        var firstAmount = rows[0].querySelector('.rt-split-amount');
        if (firstAmount) firstAmount.value = '';
      }
      // New split rows always start blank — user must select that mode.
      addSplitRow('', '');
      // If earlier rows already have amounts, fill the new row with the remainder.
      syncRemainingSplitAmount(null);
      refreshSplitOptionAvailability();
      refreshSplitBalance();
    });
  }

  document.addEventListener('click', function(e){
    if (!paymentSplitsEl) return;
    if (e.target.closest('#rt-payment-splits [data-se-listbox]')) return;
    closeAllSplitListboxes();
  });
  document.addEventListener('keydown', function(e){
    if (e.key !== 'Escape') return;
    closeAllSplitListboxes();
  });

  var clearanceBack = document.getElementById('rt-clearance-back');
  if (clearanceBack) clearanceBack.addEventListener('click', function(){
    closeAllSplitListboxes();
    closeModal(clearanceModal);
  });
  if (clearanceModal) {
    clearanceModal.addEventListener('click', function(e){
      if (e.target === clearanceModal) {
        closeAllSplitListboxes();
        closeModal(clearanceModal);
      }
    });
  }
  var clearanceSubmit = document.getElementById('rt-clearance-submit');
  if (clearanceSubmit) clearanceSubmit.addEventListener('click', submitClearance);

  document.querySelectorAll('.rt-selectable-row').forEach(function(row){
    var check = row.querySelector('.rt-row-check');
    if (check) {
      check.addEventListener('change', updateTableSelectionUi);
      check.addEventListener('click', function(e){ e.stopPropagation(); });
    }
    row.addEventListener('click', function(e){
      if (e.target.closest('a, button, input, label')) return;
      if (!check || check.disabled) return;
      check.checked = !check.checked;
      updateTableSelectionUi();
    });
  });
  updateTableSelectionUi();

  function syncDateBounds(){}

  if (window.SalesDateRangePicker) {
    SalesDateRangePicker.init({
      wrapId: 'rt-date-range-wrap',
      triggerId: 'rt-date-range-trigger',
      backdropId: 'rt-date-range-backdrop',
      panelId: 'rt-date-range-panel',
      displayId: 'rt-date-range-display',
      formId: 'room-transfer-filter-form',
      fromInputId: 'room-transfer-date-from',
      toInputId: 'room-transfer-date-to',
      applyId: 'rt-date-range-apply',
      prevId: 'rt-cal-prev',
      nextId: 'rt-cal-next',
      title0Id: 'rt-cal-title0',
      title1Id: 'rt-cal-title1',
      grid0Id: 'rt-cal-grid0',
      grid1Id: 'rt-cal-grid1',
      emptyLabel: 'Date',
      onBeforeSubmit: function(){
        if (dateFrom && !dateFrom.value) dateFrom.removeAttribute('name');
        if (dateTo && !dateTo.value) dateTo.removeAttribute('name');
      }
    });
  }

  var dateClearBtn = document.getElementById('rt-date-range-clear');
  if (dateClearBtn) {
    dateClearBtn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      var clearUrl = filterForm ? String(filterForm.getAttribute('data-clear-url') || filterForm.action || '') : '';
      if (clearUrl) window.location.href = clearUrl;
    });
  }

  var searchInput = document.getElementById('room-transfer-search');
  var searchChip = searchInput ? searchInput.closest('.rt-search-chip') : null;
  var entryCountEl = document.getElementById('room-transfer-entry-count');

  function applyRoomTransferSearch(){
    var needle = searchInput ? String(searchInput.value || '').trim().toLowerCase() : '';
    if (searchChip) searchChip.classList.toggle('is-active', !!needle);
    var rows = Array.from(document.querySelectorAll('#room-transfer-body tr.room-transfer-row'));
    var visible = 0;
    rows.forEach(function(row){
      var hay = String(row.getAttribute('data-search') || row.textContent || '').toLowerCase();
      var match = !needle || hay.indexOf(needle) !== -1;
      row.hidden = !match;
      if (!match) {
        var check = row.querySelector('.rt-row-check');
        if (check) check.checked = false;
        row.classList.remove('is-selected');
      } else {
        visible += 1;
      }
    });
    if (entryCountEl) entryCountEl.textContent = visible + ' entries';
    updateTableSelectionUi();
  }

  if (searchInput) {
    searchInput.addEventListener('input', applyRoomTransferSearch);
    searchInput.addEventListener('keydown', function(e){
      if (e.key === 'Escape') {
        searchInput.value = '';
        applyRoomTransferSearch();
        searchInput.blur();
      }
      if (e.key === 'Enter') e.preventDefault();
    });
  }

  (function initSortable(){
    var table = document.getElementById('room-transfer-table');
    if (!table) return;
    var tbody = table.tBodies[0];
    if (!tbody) return;
    var headers = Array.from(table.querySelectorAll('th.pl-sortable'));
    if (!headers.length) return;
    var activeKey = '';
    var ascending = true;

    function cellSortValue(row, colIndex, type){
      var cell = row.cells[colIndex];
      if (!cell) return type === 'number' ? 0 : '';
      var raw = cell.getAttribute('data-sort-value');
      if (raw == null || raw === '') raw = (cell.textContent || '').trim();
      if (type === 'number') {
        var n = Number(raw);
        return isFinite(n) ? n : 0;
      }
      return String(raw).toLowerCase();
    }

    function sortBy(th){
      var key = th.getAttribute('data-sort') || '';
      var type = th.getAttribute('data-sort-type') || 'text';
      var colIndex = Array.from(th.parentNode.children).indexOf(th);
      if (colIndex < 0) return;

      if (activeKey === key) ascending = !ascending;
      else {
        activeKey = key;
        ascending = true;
      }

      var rows = Array.from(tbody.rows);
      rows.sort(function(a, b){
        var av = cellSortValue(a, colIndex, type);
        var bv = cellSortValue(b, colIndex, type);
        var cmp = type === 'number'
          ? av - bv
          : String(av).localeCompare(String(bv), undefined, { numeric: true, sensitivity: 'base' });
        return ascending ? cmp : -cmp;
      });
      rows.forEach(function(row){ tbody.appendChild(row); });

      headers.forEach(function(header){
        header.classList.remove('is-sorted-asc', 'is-sorted-desc');
        header.setAttribute('aria-sort', 'none');
      });
      th.classList.add(ascending ? 'is-sorted-asc' : 'is-sorted-desc');
      th.setAttribute('aria-sort', ascending ? 'ascending' : 'descending');
    }

    headers.forEach(function(th){
      th.addEventListener('click', function(){ sortBy(th); });
      th.addEventListener('keydown', function(e){
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          sortBy(th);
        }
      });
    });
  })();
})();
</script>
