<div class="modal-backdrop" id="rt-clearance-modal" aria-hidden="true">
  <div class="staff-credit-box cp-modal-box rt-clearance-box" role="dialog" aria-modal="true" aria-labelledby="rt-clearance-title">
    <div class="staff-credit-head">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      <span id="rt-clearance-title">Payment Details</span>
    </div>
    <p class="staff-credit-copy">Enter how this payment was made. Split across modes when needed.</p>
    <div id="rt-clearance-error" class="staff-credit-error"></div>
    <div class="staff-field">
      <label for="rt-payment-date">Payment date *</label>
      <input id="rt-payment-date" class="staff-input" type="date" value="{{ today_iso }}">
    </div>
    <div class="staff-field">
      <div class="rt-split-head">
        <label>Payment mode *</label>
        <button type="button" class="rt-link-btn" id="rt-add-split-btn">Split Payment</button>
      </div>
      <div id="rt-payment-splits" class="rt-payment-splits" aria-label="Payment mode splits"></div>
      <div class="rt-split-balance" id="rt-split-balance" hidden>
        <span>Modes total</span>
        <strong id="rt-split-total" data-amount="0">0</strong>
        <span class="rt-split-vs">of</span>
        <strong id="rt-split-target" data-amount="0">0</strong>
      </div>
    </div>
    <div class="staff-field">
      <label for="rt-notes">Notes</label>
      <input id="rt-notes" class="staff-input" type="text" placeholder="Optional remark" autocomplete="off">
    </div>
    <div class="cp-alloc-wrap">
      <div class="cp-alloc-head">
        <span>Selected entries</span>
        <span id="rt-alloc-meta"></span>
      </div>
      <div class="cp-alloc-table-wrap">
        <table class="cp-alloc-table" aria-label="Payment allocations">
          <thead>
            <tr>
              <th>Invoice</th>
              <th class="pl-col-amount">Balance</th>
              <th class="pl-col-amount">Pay now</th>
            </tr>
          </thead>
          <tbody id="rt-alloc-body"></tbody>
        </table>
      </div>
      <div class="cp-alloc-total">
        <span>Payment total</span>
        <strong id="rt-alloc-total" data-amount="0">0</strong>
      </div>
    </div>
    <div class="staff-credit-actions">
      <button type="button" class="btn" id="rt-clearance-back">Back</button>
      <button type="button" class="btn btn-primary" id="rt-clearance-submit">Record Payment</button>
    </div>
  </div>
</div>
<script id="rt-payment-methods-data" type="application/json">{{ room_transfer_payment_methods|tojson }}</script>
