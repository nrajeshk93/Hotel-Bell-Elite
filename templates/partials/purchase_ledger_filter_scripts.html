<script>
(function(){
  var f = document.getElementById('purchase-ledger-filter-form');
  if (!f) return;

  function submitScope(){ f.submit(); }

  function closeListbox(root){
    if (!root) return;
    var trigger = root.querySelector('.se-filter-chip-trigger');
    var list = root.querySelector('.se-filter-listbox');
    var search = root.querySelector('.pl-supplier-search');
    root.classList.remove('is-open');
    if (trigger) trigger.setAttribute('aria-expanded', 'false');
    if (list) {
      list.hidden = true;
      list.style.paddingBottom = '';
      list.scrollTop = 0;
    }
    if (search) search.value = '';
    if (root.hasAttribute('data-se-listbox-searchable')) {
      filterSearchableOptions(root, '');
    }
  }

  function closeAllListboxes(except){
    document.querySelectorAll('#purchase-ledger-filter-form [data-se-listbox].is-open').forEach(function(root){
      if (root !== except) closeListbox(root);
    });
  }

  function optionsWrapFor(root){
    return root.querySelector('.pl-supplier-options, .pl-category-options');
  }

  function emptyElFor(root){
    return root.querySelector('.pl-supplier-empty');
  }

  function scoreSearchOption(option, needle){
    if (!needle) return 0;
    var name = (option.getAttribute('data-name') || '').toLowerCase();
    var gst = (option.getAttribute('data-gst') || '').toLowerCase();
    var terms = needle.split(/\s+/).filter(Boolean);
    var score = 0;
    for (var i = 0; i < terms.length; i++) {
      var term = terms[i];
      if (name === term || (gst && gst === term)) score += 120;
      else if (name.indexOf(term) === 0) score += 90;
      else if (gst && gst.indexOf(term) === 0) score += 80;
      else if (name.indexOf(term) !== -1) score += 60;
      else if (gst && gst.indexOf(term) !== -1) score += 50;
      else return -1;
    }
    return score;
  }

  function filterSearchableOptions(root, query){
    var optionsWrap = optionsWrapFor(root);
    var emptyEl = emptyElFor(root);
    if (!optionsWrap) return;
    var needle = String(query || '').trim().toLowerCase();
    var options = Array.from(optionsWrap.querySelectorAll('.pl-supplier-option, .pl-filter-option'));

    if (!needle) {
      options.sort(function(a, b){
        var aAll = a.getAttribute('data-value') === 'all';
        var bAll = b.getAttribute('data-value') === 'all';
        if (aAll && !bAll) return -1;
        if (bAll && !aAll) return 1;
        return (a.getAttribute('data-name') || '').localeCompare(b.getAttribute('data-name') || '');
      });
      options.forEach(function(option){
        option.classList.remove('is-filtered-out');
        optionsWrap.appendChild(option);
      });
      if (emptyEl) emptyEl.hidden = true;
      return;
    }

    var ranked = options.map(function(option){
      return { option: option, score: scoreSearchOption(option, needle) };
    }).filter(function(entry){
      return entry.score >= 0 && (entry.option.getAttribute('data-value') || '') !== 'all';
    });

    ranked.sort(function(a, b){
      return b.score - a.score || (a.option.getAttribute('data-name') || '').localeCompare(b.option.getAttribute('data-name') || '');
    });

    var best = ranked.length ? [ranked[0]] : [];

    options.forEach(function(option){ option.classList.add('is-filtered-out'); });
    best.forEach(function(entry){
      entry.option.classList.remove('is-filtered-out');
      optionsWrap.appendChild(entry.option);
    });

    if (emptyEl) emptyEl.hidden = true;
  }

  function visibleOptions(root){
    var optionsWrap = optionsWrapFor(root);
    if (!optionsWrap) return [];
    return Array.from(optionsWrap.querySelectorAll('.pl-supplier-option:not(.is-filtered-out), .pl-filter-option:not(.is-filtered-out)'));
  }

  function scrollSelectedToTop(list){
    if (!list) return;
    var selected = list.querySelector('.se-filter-listbox-option.is-selected, .se-filter-listbox-option[aria-selected="true"], .pl-supplier-option.is-selected, .pl-filter-option.is-selected');
    if (!selected || selected.classList.contains('is-filtered-out')) return;
    list.style.paddingBottom = '';
    requestAnimationFrame(function(){
      var searchWrap = list.querySelector('.pl-supplier-search-wrap, .ep-listbox-search-wrap');
      var topPad = searchWrap ? searchWrap.offsetHeight : 0;
      if (list.scrollHeight <= list.clientHeight + 1) {
        list.scrollTop = 0;
        return;
      }
      var target = Math.max(0, selected.offsetTop - topPad);
      var naturalMax = Math.max(0, list.scrollHeight - list.clientHeight);
      if (target > naturalMax) {
        list.style.paddingBottom = (target - naturalMax) + 'px';
      }
      list.scrollTop = target;
    });
  }

  function openListbox(root){
    if (!root || root.classList.contains('is-disabled')) return;
    closeAllListboxes(root);
    var trigger = root.querySelector('.se-filter-chip-trigger');
    var list = root.querySelector('.se-filter-listbox');
    var search = root.querySelector('.pl-supplier-search');
    root.classList.add('is-open');
    if (trigger) trigger.setAttribute('aria-expanded', 'true');
    if (list) {
      list.hidden = false;
      if (root.hasAttribute('data-se-listbox-searchable')) {
        filterSearchableOptions(root, '');
        scrollSelectedToTop(list);
        if (search) {
          search.value = '';
          search.focus();
        }
      } else {
        var selected = list.querySelector('[aria-selected="true"]') || list.querySelector('.se-filter-listbox-option');
        scrollSelectedToTop(list);
        if (selected) selected.focus({ preventScroll: true });
      }
    }
  }

  function toggleListbox(root){
    if (!root) return;
    if (root.classList.contains('is-open')) closeListbox(root);
    else openListbox(root);
  }

  function selectOption(root, option){
    if (!root || !option || option.classList.contains('is-filtered-out')) return;
    var input = root.querySelector('input[type="hidden"]');
    var valueEl = root.querySelector('.se-filter-chip-value');
    var list = root.querySelector('.se-filter-listbox');
    var value = option.getAttribute('data-value') || '';
    var nameEl = option.querySelector('.pl-supplier-option-name');
    var label = nameEl ? nameEl.textContent.trim() : (option.textContent || '').trim();
    if (input) input.value = value;
    if (valueEl) valueEl.textContent = label;
    if (list) {
      list.querySelectorAll('.pl-supplier-option, .pl-filter-option, .se-filter-listbox-option').forEach(function(opt){
        var on = opt === option;
        opt.classList.toggle('is-selected', on);
        opt.setAttribute('aria-selected', on ? 'true' : 'false');
      });
    }
    closeListbox(root);
    submitScope();
  }

  function bindListbox(root){
    if (!root) return;
    var trigger = root.querySelector('.se-filter-chip-trigger');
    var list = root.querySelector('.se-filter-listbox');
    var optionsWrap = optionsWrapFor(root);
    var search = root.querySelector('.pl-supplier-search');
    if (!trigger || !list) return;

    trigger.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      toggleListbox(root);
    });
    trigger.addEventListener('keydown', function(e){
      if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openListbox(root);
      } else if (e.key === 'Escape') {
        closeListbox(root);
      }
    });

    if (search) {
      search.addEventListener('input', function(){
        filterSearchableOptions(root, search.value);
      });
      search.addEventListener('click', function(e){ e.stopPropagation(); });
      search.addEventListener('keydown', function(e){
        e.stopPropagation();
        if (e.key === 'Escape') {
          e.preventDefault();
          closeListbox(root);
          trigger.focus();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          var firstMatch = visibleOptions(root)[0];
          if (firstMatch) selectOption(root, firstMatch);
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          var first = visibleOptions(root)[0];
          if (first) first.focus();
        }
      });
    }

    var clickTarget = optionsWrap || list;
    clickTarget.addEventListener('click', function(e){
      var option = e.target.closest('.pl-supplier-option, .pl-filter-option, .se-filter-listbox-option');
      if (!option || !clickTarget.contains(option) || option.classList.contains('is-filtered-out')) return;
      e.preventDefault();
      selectOption(root, option);
    });

    var keyTarget = optionsWrap || list;
    keyTarget.addEventListener('keydown', function(e){
      var options = root.hasAttribute('data-se-listbox-searchable')
        ? visibleOptions(root)
        : Array.from(list.querySelectorAll('.se-filter-listbox-option'));
      if (!options.length) return;
      var idx = options.indexOf(document.activeElement);
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        options[Math.min(options.length - 1, Math.max(0, idx) + 1)].focus();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        options[Math.max(0, (idx < 0 ? 0 : idx) - 1)].focus();
      } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (idx >= 0) selectOption(root, options[idx]);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        closeListbox(root);
        trigger.focus();
      }
    });
  }

  document.querySelectorAll('#purchase-ledger-filter-form [data-se-listbox]').forEach(bindListbox);
  document.addEventListener('click', function(e){
    document.querySelectorAll('#purchase-ledger-filter-form [data-se-listbox].is-open').forEach(function(root){
      if (!root.contains(e.target)) closeListbox(root);
    });
  });
  document.addEventListener('keydown', function(e){
    if (e.key !== 'Escape') return;
    document.querySelectorAll('#purchase-ledger-filter-form [data-se-listbox].is-open').forEach(closeListbox);
  });

  var dateFrom = document.getElementById('purchase-ledger-date-from');
  var dateTo = document.getElementById('purchase-ledger-date-to');
  if (window.SalesDateRangePicker) {
    SalesDateRangePicker.init({
      wrapId: 'pl-date-range-wrap',
      triggerId: 'pl-date-range-trigger',
      backdropId: 'pl-date-range-backdrop',
      panelId: 'pl-date-range-panel',
      displayId: 'pl-date-range-display',
      formId: 'purchase-ledger-filter-form',
      fromInputId: 'purchase-ledger-date-from',
      toInputId: 'purchase-ledger-date-to',
      applyId: 'pl-date-range-apply',
      prevId: 'pl-cal-prev',
      nextId: 'pl-cal-next',
      title0Id: 'pl-cal-title0',
      title1Id: 'pl-cal-title1',
      grid0Id: 'pl-cal-grid0',
      grid1Id: 'pl-cal-grid1',
      emptyLabel: 'Date',
      onBeforeSubmit: function(){
        if (dateFrom && !dateFrom.value) dateFrom.removeAttribute('name');
        if (dateTo && !dateTo.value) dateTo.removeAttribute('name');
      }
    });
  }
  var clearBtn = document.getElementById('pl-date-range-clear');
  if (clearBtn) {
    clearBtn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      var clearUrl = f.getAttribute('data-clear-url') || f.action || '';
      if (clearUrl) window.location.href = clearUrl;
    });
  }

  if (typeof formatInr === 'function') {
    var totalEl = document.getElementById('pl-total-amount');
    if (totalEl) totalEl.textContent = formatInr(totalEl.getAttribute('data-amount'), 0);
    document.querySelectorAll('.pl-amount[data-amount]').forEach(function(el){
      el.textContent = formatInr(el.getAttribute('data-amount'), 0);
    });
  }
  if (typeof scheduleFitKpiValues === 'function') scheduleFitKpiValues();

  /* ---------- Sortable purchase table headers ---------- */
  (function initPurchaseTableSort(){
    var table = document.querySelector('table.pl-table');
    if (!table) return;
    var tbody = table.tBodies[0];
    if (!tbody) return;
    var headers = Array.from(table.querySelectorAll('th.pl-sortable'));
    var activeKey = '';
    var ascending = true;

    function cellSortValue(row, colIndex, type){
      var cell = row.cells[colIndex];
      if (!cell) return '';
      var raw = cell.getAttribute('data-sort-value');
      if (raw == null || raw === '') raw = (cell.textContent || '').trim();
      if (type === 'number') {
        var n = Number(raw);
        return isFinite(n) ? n : 0;
      }
      return String(raw).toLowerCase();
    }

    function sortBy(th){
      var key = th.getAttribute('data-sort') || '';
      var type = th.getAttribute('data-sort-type') || 'text';
      var colIndex = Array.from(th.parentNode.children).indexOf(th);
      if (colIndex < 0) return;

      if (activeKey === key) ascending = !ascending;
      else {
        activeKey = key;
        ascending = true;
      }

      var rows = Array.from(tbody.rows);
      rows.sort(function(a, b){
        var av = cellSortValue(a, colIndex, type);
        var bv = cellSortValue(b, colIndex, type);
        var cmp = 0;
        if (type === 'number') cmp = av - bv;
        else cmp = String(av).localeCompare(String(bv), undefined, { numeric: true, sensitivity: 'base' });
        return ascending ? cmp : -cmp;
      });
      rows.forEach(function(row){ tbody.appendChild(row); });

      headers.forEach(function(header){
        header.classList.remove('is-sorted-asc', 'is-sorted-desc');
        header.setAttribute('aria-sort', 'none');
      });
      th.classList.add(ascending ? 'is-sorted-asc' : 'is-sorted-desc');
      th.setAttribute('aria-sort', ascending ? 'ascending' : 'descending');
    }

    headers.forEach(function(th){
      th.addEventListener('click', function(){ sortBy(th); });
      th.addEventListener('keydown', function(e){
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          sortBy(th);
        }
      });
    });
  })();
})();
</script>
